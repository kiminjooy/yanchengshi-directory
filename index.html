<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>韩国企业清单 | 中国（江苏）韩国经贸合作交流会</title>
  <style>
    :root{
      --navy:#10263F;
      --navy-2:#183B63;
      --ink:#1D2733;
      --muted:#607080;
      --gold:#B89044;
      --gold-soft:#E9D8B0;
      --ivory:#FBF8F2;
      --paper:#FFFFFF;
      --mist:#F2F5F8;
      --line:#E5E9EF;
      --red:#B63A3A;
      --blue:#2C5E9E;
      --shadow:0 18px 44px rgba(16,38,63,.10);
      --radius-xl:24px;
      --radius-lg:18px;
      --radius-md:14px;
      --max:1120px;
      --font:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",Arial,sans-serif;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:var(--font);
      color:var(--ink);
      line-height:1.68;
      background:
        radial-gradient(circle at top left, rgba(44,94,158,.08), transparent 26%),
        radial-gradient(circle at top right, rgba(182,58,58,.06), transparent 22%),
        linear-gradient(180deg, #f6f8fb 0%, #f4f1eb 100%);
    }
    a{color:inherit;text-decoration:none}

    .wrap{
      max-width:var(--max);
      margin:0 auto;
      padding:28px 18px 56px;
    }

    .shell{
      background:rgba(255,255,255,.78);
      border:1px solid rgba(255,255,255,.9);
      border-radius:32px;
      overflow:hidden;
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
    }

    .hero{
      position:relative;
      padding:30px 28px 34px;
      color:#fff;
      background:
        linear-gradient(135deg, rgba(11,28,48,.96), rgba(18,48,82,.92)),
        linear-gradient(90deg, rgba(182,58,58,.16), rgba(44,94,158,.16));
      overflow:hidden;
    }

    .hero::before{
      content:"";
      position:absolute;
      inset:-30% auto auto -10%;
      width:320px;
      height:320px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(255,255,255,.10), transparent 70%);
      pointer-events:none;
    }

    .hero::after{
      content:"";
      position:absolute;
      right:-80px;
      top:-40px;
      width:280px;
      height:280px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(184,144,68,.22), transparent 68%);
      pointer-events:none;
    }

    .hero-inner{position:relative;z-index:1}

    .hero-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .hero-badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.16);
      font-size:12px;
      letter-spacing:.12em;
      text-transform:uppercase;
      font-weight:700;
    }

    .hero-badge::before,
    .hero-badge::after{
      content:"";
      display:block;
      width:8px;
      height:8px;
      border-radius:50%;
    }
    .hero-badge::before{background:var(--red)}
    .hero-badge::after{background:var(--blue)}

    .kita-logo img{
      display:block;
      max-width:108px;
      height:auto;
      filter:brightness(0) invert(1);
      opacity:.95;
    }

    .title-wrap{
      border-top:1px solid rgba(255,255,255,.12);
      border-bottom:1px solid rgba(255,255,255,.10);
      padding:18px 0 16px;
      margin-bottom:16px;
    }

    .eyebrow{
      display:inline-block;
      margin-bottom:10px;
      color:rgba(233,216,176,.96);
      font-size:13px;
      font-weight:700;
      letter-spacing:.08em;
    }

    h1{
      margin:0;
      font-size:31px;
      line-height:1.28;
      letter-spacing:.01em;
      font-weight:800;
    }

    .subtitle{
      margin:14px 0 0;
      font-size:15px;
      color:rgba(255,255,255,.86);
      max-width:780px;
    }

    .meta{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:16px;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 12px;
      border-radius:14px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      font-size:13px;
      color:#fff;
    }

    .content{padding:26px}

    .section{
      background:linear-gradient(180deg, rgba(255,255,255,.96), rgba(251,248,242,.95));
      border:1px solid var(--line);
      border-radius:var(--radius-xl);
      padding:22px;
      box-shadow:0 10px 22px rgba(16,38,63,.04);
    }
    .section + .section{margin-top:16px}

    .section-head{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:14px;
    }

    .section-head .mark{
      width:34px;
      height:34px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg, rgba(184,144,68,.16), rgba(184,144,68,.28));
      color:var(--gold);
      font-weight:800;
      font-size:13px;
      border:1px solid rgba(184,144,68,.24);
      flex:0 0 auto;
    }

    .section-head h2{
      margin:0;
      font-size:18px;
      color:var(--navy);
      letter-spacing:.02em;
    }

    .section-head .line{
      flex:1;
      height:1px;
      background:linear-gradient(90deg, rgba(184,144,68,.5), rgba(229,233,239,1));
    }

    .lede{
      margin:0;
      color:#2d3945;
      font-size:15px;
    }

    .filter-wrap{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:18px;
    }

    .filter-btn{
      border:none;
      cursor:pointer;
      padding:10px 16px;
      border-radius:999px;
      background:#fff;
      border:1px solid var(--line);
      color:var(--navy);
      font-weight:700;
      font-size:13px;
      transition:.2s ease;
    }

    .filter-btn:hover{
      transform:translateY(-1px);
      box-shadow:0 8px 18px rgba(16,38,63,.08);
    }

    .filter-btn.active{
      background:linear-gradient(135deg, var(--navy), var(--navy-2));
      color:#fff;
      border-color:transparent;
    }

    .category-block + .category-block{
      margin-top:24px;
    }

    .category-title{
      display:flex;
      align-items:center;
      gap:10px;
      margin:0 0 14px;
      color:var(--navy);
      font-size:20px;
      font-weight:800;
    }

    .category-title::before{
      content:"";
      width:8px;
      height:24px;
      border-radius:999px;
      background:linear-gradient(180deg, var(--gold), var(--blue));
      flex:0 0 auto;
    }

    .seller-grid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:14px;
    }

    .seller-card{
      display:block;
      border:1px solid var(--line);
      border-radius:20px;
      background:linear-gradient(180deg, #fff, #faf7f1);
      padding:18px;
      transition:.2s ease;
      box-shadow:0 8px 18px rgba(16,38,63,.04);
      min-height:220px;
      position:relative;
      overflow:hidden;
    }

    .seller-card::before{
      content:"";
      position:absolute;
      left:0; right:0; top:0;
      height:4px;
      background:linear-gradient(90deg, var(--red), var(--gold), var(--blue));
      opacity:.95;
    }

    .seller-card:hover{
      transform:translateY(-3px);
      box-shadow:0 16px 30px rgba(16,38,63,.10);
    }

    .seller-tag{
      display:inline-flex;
      align-items:center;
      padding:6px 10px;
      border-radius:999px;
      background:#f8f3e8;
      color:#7e6129;
      border:1px solid rgba(184,144,68,.22);
      font-size:11px;
      font-weight:800;
      margin-bottom:12px;
    }

    .seller-name{
      margin:0 0 8px;
      font-size:18px;
      color:var(--navy);
      line-height:1.4;
      font-weight:800;
    }

    .seller-product{
      margin:0 0 10px;
      font-size:14px;
      color:#2f3c49;
      font-weight:700;
    }

    .seller-desc{
      margin:0 0 14px;
      font-size:13.5px;
      color:var(--muted);
      line-height:1.75;
      min-height:70px;
    }

    .keyword-list{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-bottom:14px;
    }

    .keyword{
      display:inline-flex;
      padding:6px 10px;
      border-radius:999px;
      background:#fff;
      border:1px solid var(--line);
      color:#506171;
      font-size:12px;
      font-weight:600;
    }

    .view-more{
      display:inline-flex;
      align-items:center;
      gap:6px;
      font-size:13px;
      font-weight:800;
      color:var(--blue);
    }

    .footer-note{
      margin-top:18px;
      text-align:center;
      color:#758294;
      font-size:12px;
    }

    .hidden{
      display:none !important;
    }

    @media (max-width: 980px){
      .seller-grid{
        grid-template-columns:repeat(2, minmax(0,1fr));
      }
    }

    @media (max-width: 680px){
      h1{font-size:26px}
      .content{padding:18px}
      .seller-grid{
        grid-template-columns:1fr;
      }
      .hero{padding:24px 18px 28px}
      .section{padding:18px}
    }

    @media print{
      body{background:#fff}
      .wrap{padding:0}
      .shell,.section,.seller-card{box-shadow:none}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="shell">
      <header class="hero">
        <div class="hero-inner">
          <div class="hero-top">
            <div class="hero-badge">Korean Seller Directory</div>
            <div class="kita-logo">
              <img src="https://kita.org/imgs/common/logo-kita-org.svg" alt="KITA" />
            </div>
          </div>

          <div class="title-wrap">
            <div class="eyebrow">中韩经贸合作交流项目</div>
            <h1>韩国企业清单</h1>

      </header>

      <main class="content">
        <section class="section">
          <div class="section-head">
          </div>
          <strong>3月30日（周一）开放</strong>
          <p class="lede">
            
          </p>
